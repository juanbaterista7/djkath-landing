    <script>
      (function(){
        var page=(location.pathname.split('/').pop()||'index.html');
        if(!page) page='index.html';
        document.querySelectorAll('a.nav-link').forEach(function(a){
          if(a.getAttribute('href')===page) a.classList.add('active');
        });
        var btn=document.getElementById('menuBtn'),cls=document.getElementById('menuClose'),
            dr=document.getElementById('drawer'),bd=document.getElementById('backdrop');
        function open(){dr.classList.remove('translate-x-full');bd.classList.remove('opacity-0','pointer-events-none');}
        function close(){dr.classList.add('translate-x-full');bd.classList.add('opacity-0','pointer-events-none');}
        if(btn){btn.onclick=open;cls.onclick=close;bd.onclick=close;}
      })();
